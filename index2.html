<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testni boshlash</title>
  <style>
    /* BODY STYLE */
    body {
      font-family: 'Arial', sans-serif;
      background: url(image.png) no-repeat center center/cover;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    /* CONTAINER */
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      width: 300px;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 24px;
    }

    /* INPUT STYLE */
    input {
      width: 85%;
      padding: 12px 15px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      box-shadow: 0 0 8px #fff;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* BUTTON STYLE */
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #ff4b2b;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff416c;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Imtihonni boshlash</h2>
    <input id="fname" placeholder="Ism">
    <input id="lname" placeholder="Familiya">
    <button onclick="startTest()">Boshlash</button>
  </div>

  <script>
    function startTest(){
      const f = document.getElementById("fname").value.trim();
      const l = document.getElementById("lname").value.trim();

      if(!f || !l){
        alert("Ism va familiyani kiriting!");
        return;
      }

      localStorage.setItem("fname", f);
      localStorage.setItem("lname", l);

      window.location.href = "test2.html";
    }
  </script>

</body>
</html>
