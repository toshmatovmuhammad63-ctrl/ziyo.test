// Aralashtirish funksiyasi
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Savollarni va javoblarni aralashtirish

    // q = {q:"savol", a:[..], c:correctIndex}
    const answers = q.a.map((ans, idx) => ({ans, idx}));
    const correctIdx = q.c;

    // Javoblarni aralashtirish
    shuffleArray(answers);

    // Yangi to‘g‘ri javob indexini topish
    const newCorrect = answers.findIndex(a => a.idx === correctIdx);

    // Yangi arrayga joylash
    return {
        q: q.q,
        a: answers.map(a => a.ans),
        c: newCorrect
    };
});
